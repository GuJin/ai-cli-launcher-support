name: Bug report
description: Report a reproducible problem with AI CLI Launcher
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. The Debug report at the bottom already includes
        your plugin version, IDE, macOS version, terminal, and configured commands, so
        there is no need to type any of those in separately.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a project
        2. Click AI CLI Launcher
        3. Choose ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: debug-report
    attributes:
      label: Debug report
      description: Paste the Settings > Tools > AI CLI Launcher > Copy Debug Report output. It includes plugin version, IDE, macOS, terminal, and command checks. Remove anything sensitive before posting.
      render: text
    validations:
      required: true
