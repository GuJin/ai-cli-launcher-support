name: Feature request
description: Suggest an improvement for AI CLI Launcher
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow or problem
      description: Describe what you are trying to do and where the current plugin gets in the way.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal or CLI involved
      placeholder: "Ghostty, iTerm2, Terminal.app, Codex, Claude, custom command, etc."
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
